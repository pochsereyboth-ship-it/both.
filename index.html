<style>
    table,tr,th,td,input{border:1pxsolidblack;norder-collapse:collapse;}
    </style>
    <body>
        <form>
            <table> <thead>
                    <tr style="background-color: rgb(18, 246, 128);">
                        <th>Name</th>
                        <th>Value</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Name</td>
                        <td>
                            <input type="text">
                        </td>
                    </tr>
                    <tr>
                        <td>Sex</td>
                        <td>
                            <label for="male"></label>
                            <input type="radio" name="Sex_status" id="male">Male
                            <br>
                            <label for="female"></label>
                            <input type="radio" name="Sex_status" id="female">Famle
                        </td>
                    </tr>
                    <tr>
                        <td>Eye color</td>
                        <td>
                            <select name="" id="">
                                <option value="green">green</option>
                                <option value="black">black</option>
                                <option value="brown">brown</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td>Check all that apply</td>
                        <td>
                            <label for="over6"></label>
                            <input type="checkbox">Over 6 feet tall
                            <br>
                            <label for="over200"></label>
                            <input type="checkbox">Over 200 pounds
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2">Describe your athletic ability:</td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <textarea name="" id="" cols="38" rows="10"></textarea>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2" align="center">
                            <input type="submit" value="Enter my information">
                        </td>
                    </tr>
                </tbody>
            </table>
        </form>
    </body>
</html>
